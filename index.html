<!DOCTYPE html>
<html>

<head>
<title>Lumo</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
max-width:600px;
margin:auto;
}

h1{
text-align:center;
}

.post-box{
background:white;
padding:10px;
margin-bottom:20px;
border-radius:10px;
}

textarea{
width:100%;
height:60px;
}

button{
margin-top:10px;
padding:8px 15px;
}

.post{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>Lumo</h1>

<div class="post-box">

<textarea id="postInput" placeholder="Что происходит?"></textarea>

<button onclick="addPost()">Post</button>

</div>

<div id="feed"></div>

<script>

function addPost(){

const text = document.getElementById("postInput").value

if(text === "") return

const post = document.createElement("div")
post.className = "post"
post.innerText = text

const feed = document.getElementById("feed")

feed.prepend(post)

document.getElementById("postInput").value = ""

}

</script>

</body>
</html>
