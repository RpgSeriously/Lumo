<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Lumo — Mini Social</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    max-width: 600px;
    margin: auto;
    padding: 10px;
}

h1 {
    text-align: center;
}

.auth-box, .post-box {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

button {
    padding: 8px 15px;
    margin-top: 5px;
    cursor: pointer;
}

.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}

.actions {
    margin-top: 10px;
    font-size: 14px;
}

.actions button {
    margin-right: 10px;
}
</style>
</head>

<body>

<h1>Lumo</h1>

<div class="auth-box" id="authBox">
    <h3>Регистрация / Вход</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button id="registerBtn">Register</button>
    <button id="loginBtn">Login</button>
    <p id="authMessage"></p>
</div>

<div class="post-box" id="postSection" style="display:none;">
    <textarea id="postInput" placeholder="Что происходит?"></textarea>
    <button id="postBtn">Post</button>
</div>

<div id="feed"></div>

<script type="module">
// Firebase SDK
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, updateDoc, doc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Вставляем твой firebaseConfig
const firebaseConfig = {
  apiKey: "AIzaSyAEtEVtmQS-8-VSa971Im97Hp6mkP2K_gU",
  authDomain: "lumoproject-105df.firebaseapp.com",
  projectId: "lumoproject-105df",
  storageBucket: "lumoproject-105df.firebasestorage.app",
  messagingSenderId: "611887907446",
  appId: "1:611887907446:web:0c5fa8851cc1242ee81557",
  measurementId: "G-0MMXF407E8"
};

// Инициализация Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser = null;

// Регистрация
function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if(!email || !password) return;
    createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
            document.getElementById("authMessage").innerText = "Регистрация успешна!";
        })
        .catch(error => {
            console.log(error);
            document.getElementById("authMessage").innerText = error.message;
        });
}

// Вход
function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if(!email || !password) return;
    signInWithEmailAndPassword(auth, email, password)
        .then(() => {
            document.getElementById("authMessage").innerText = "Вход выполнен!";
        })
        .catch(error => {
            console.log(error);
            document.getElementById("authMessage").innerText = error.message;
        });
}

// Следим за состоянием пользователя
onAuthStateChanged(auth, user => {
    if(user){
        currentUser = user;
        document.getElementById("authBox").style.display = "none";
        document.getElementById("postSection").style.display = "block";
        loadPosts();
    } else {
        currentUser = null;
        document.getElementById("authBox").style.display = "block";
        document.getElementById("postSection").style.display = "none";
        document.getElementById("feed").innerHTML = "";
    }
});

// Работа с постами
const postsCollection = collection(db, "posts");

async function addPost(){
    const text = document.getElementById("postInput").value;
    if(text === "" || !currentUser) return;

    await addDoc(postsCollection, {
        text: text,
        likes: 0,
        uid: currentUser.uid,
        email: currentUser.email,
        date: Date.now()
    });
    document.getElementById("postInput").value = "";
}

// Лента постов в реальном времени
function loadPosts(){
    const q = query(postsCollection, orderBy("date","desc"));
    onSnapshot(q, snapshot => {
        const feed = document.getElementById("feed");
        feed.innerHTML = "";
        snapshot.forEach(docSnap => {
            const post = docSnap.data();
            const div = document.createElement("div");
            div.className = "post";
            div.innerHTML = `
                <strong>${post.email}</strong><br>
                ${post.text}
                <div class="actions">
                    <button onclick="likePost('${docSnap.id}', ${post.likes})">❤️ ${post.likes}</button>
                    ${post.uid === currentUser.uid ? `<button onclick="deletePost('${docSnap.id}')">🗑 Delete</button>` : ""}
                </div>
            `;
            feed.appendChild(div);
        });
    });
}

// Лайк поста
async function likePost(id, currentLikes){
    const postRef = doc(db, "posts", id);
    await updateDoc(postRef, { likes: currentLikes + 1 });
}

// Удаление поста
async function deletePost(id){
    const postRef = doc(db, "posts", id);
    await deleteDoc(postRef);
}

// Добавляем глобальные функции для кнопок (module scope → window)
window.register = register;
window.login = login;
window.addPost = addPost;
window.likePost = likePost;
window.deletePost = deletePost;

// Привязываем кнопки к функциям (дополнительно)
document.getElementById("registerBtn").addEventListener("click", register);
document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("postBtn").addEventListener("click", addPost);

</script>

</body>
</html>
